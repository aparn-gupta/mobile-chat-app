name: Build Android APK
on:
  push:
    branches:
      - main  # Runs whenever you push to the main branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repo
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Build APK (Local)
        # The --local flag makes GitHub do the work, not EAS servers
        run: npx eas build --platform android --profile preview --local --non-interactive

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: ./*.apk

    # ADD THIS STEP BELOW 👇
      - name: 🔧 Install EAS CLI
        run: npm install -g eas-cli

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Build APK (Local)
        run: eas build --platform android --profile preview --local --non-interactive
